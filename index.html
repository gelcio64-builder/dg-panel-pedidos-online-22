<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' data: blob: https: http:; connect-src *; navigate-to *;">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>D&G Açaí Berry — Pedidos Online</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700;800&family=Fredoka:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07050f;--surface:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);
  --purple:#be3cff;--purple-soft:rgba(190,60,255,0.12);
  --gold:#ffd166;--gold-soft:rgba(255,209,102,0.1);
  --green:#06d6a0;--red:#ef233c;--teal:#0bbfbf;
  --text:#ede8f5;--muted:rgba(237,232,245,0.45);
  --r:14px;--r-sm:8px;--r-lg:22px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 70% 50% at 15% -5%,rgba(120,0,200,0.35) 0%,transparent 55%),
             radial-gradient(ellipse 50% 40% at 85% 100%,rgba(255,80,20,0.12) 0%,transparent 50%);}
.page{position:relative;z-index:1;max-width:620px;margin:0 auto;padding:0 16px 80px;}
.header{text-align:center;padding:48px 20px 40px;}
.logo-wrap{width:110px;height:110px;margin:0 auto 20px;}
.logo-ring{width:100%;height:100%;border-radius:50%;background:conic-gradient(from 0deg,var(--purple),var(--gold),var(--purple));padding:3px;animation:spin 6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.logo-inner{width:100%;height:100%;border-radius:50%;background:#120920;overflow:hidden;}
.logo-inner img{width:100%;height:100%;object-fit:cover;}
.header-eyebrow{font-size:11px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--purple);margin-bottom:8px;}
.header-title{font-family:'Fredoka',sans-serif;font-size:48px;font-weight:700;line-height:1;letter-spacing:1px;color:#9b10f5;-webkit-text-fill-color:#9b10f5;text-shadow:0 0 40px rgba(155,16,245,0.4),2px 2px 0px rgba(0,0,0,0.3);margin-bottom:10px;}
.header-sub{color:var(--muted);font-size:13px;letter-spacing:2px;text-transform:uppercase;}
.header-strip{display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap;margin-top:22px;padding-top:22px;border-top:1px solid var(--border);}
.strip-item{font-size:12px;color:var(--muted);font-weight:500;display:flex;align-items:center;gap:6px;}
.strip-dot{width:6px;height:6px;border-radius:50%;background:var(--green);}

/* SECTION DIVIDERS */
.section-divider{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.section-divider span{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;color:var(--text);white-space:nowrap;}
.section-divider::after{content:'';flex:1;height:1px;background:var(--border);}

/* ORDER CARD */
.order-card{background:rgba(255,255,255,0.025);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:16px;transition:border-color 0.3s;animation:slideUp 0.3s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.order-card:hover{border-color:rgba(190,60,255,0.3);}
.order-head{display:flex;align-items:center;justify-content:space-between;padding:16px 22px;background:rgba(190,60,255,0.06);border-bottom:1px solid var(--border);}
.order-num{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1.5px;color:var(--gold);}
.order-body{padding:22px;}
.field{margin-bottom:18px;}
.field label{display:block;font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.field input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:13px 14px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;transition:border-color 0.2s,background 0.2s;-webkit-appearance:none;text-transform:uppercase;letter-spacing:0.5px;}.field select{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:13px 14px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;transition:border-color 0.2s,background 0.2s;-webkit-appearance:none;}
.field input:focus,.field select:focus{outline:none;border-color:var(--purple);background:var(--purple-soft);}
.field input::placeholder{color:var(--muted);}
.field select option{background:#1a0d2e;color:var(--text);}
.fields-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.s-label{font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}

/* PRODUCTS */
.products-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:10px;}
.product-tile{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;transition:border-color 0.2s,box-shadow 0.2s;}
.product-tile.active{border-color:var(--purple);box-shadow:0 0 0 2px var(--purple-soft);}
.product-tile.special{border-color:rgba(255,209,102,0.3);}
.product-tile.special.active{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold-soft);}
.p-img{width:100%;height:86px;overflow:hidden;position:relative;}
.p-img img{width:100%;height:100%;object-fit:cover;transition:transform 0.3s;}
.p-img .p-img-bg{width:100%;height:100%;background-size:155% auto;transition:background-size 0.3s;}
.product-tile:hover .p-img img{transform:scale(1.06);}
.product-tile:hover .p-img-bg{background-size:162% auto;}
.p-badge{position:absolute;top:6px;right:6px;background:var(--gold);color:#07050f;font-size:9px;font-weight:800;padding:2px 6px;border-radius:10px;text-transform:uppercase;letter-spacing:0.5px;}
.p-badge.new{background:var(--green);color:#07050f;}
.p-info{padding:9px 10px 11px;}
.p-name{font-size:12px;font-weight:700;line-height:1.2;margin-bottom:3px;}
.p-price{font-size:15px;font-weight:800;color:var(--gold);margin-bottom:7px;}
.product-tile.special .p-price{color:var(--teal);}
.qty-row{display:flex;align-items:center;background:rgba(0,0,0,0.25);border-radius:20px;overflow:hidden;width:fit-content;}
.q-btn{width:26px;height:26px;border:none;background:transparent;color:var(--text);font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s;flex-shrink:0;}
.q-btn:hover{background:var(--purple);}
.product-tile.special .q-btn:hover{background:var(--teal);}
.q-val{min-width:22px;text-align:center;font-size:13px;font-weight:800;}

/* COMPLEMENTOS */
.prod-comp-sections{margin-bottom:20px;}
.pcs-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px;}
.pcs-title{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
.pcs-title .logo-sm{width:16px;height:16px;border-radius:50%;object-fit:cover;flex-shrink:0;}
.pcs-subtitle{font-size:10px;color:var(--muted);margin-bottom:10px;}
.comp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
.comp-col{display:flex;flex-direction:column;gap:4px;}
.chip{border-radius:6px;padding:7px 4px;text-align:center;cursor:pointer;transition:all 0.15s;font-size:11px;font-weight:600;line-height:1.2;border:1px solid var(--border);background:var(--surface);user-select:none;}
.chip:active{transform:scale(0.95);}
.chip.chip-comp.on{background:var(--purple-soft);border-color:var(--purple);color:var(--purple);}
.chip.chip-dobro{font-size:10px;color:var(--muted);opacity:0.3;pointer-events:none;}
.chip.chip-dobro.unlocked{opacity:1;pointer-events:auto;}
.chip.chip-dobro.on{background:var(--gold-soft);border-color:var(--gold);color:var(--gold);}
.extras-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:24px;}
.extra-tile{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:12px 8px;cursor:pointer;transition:all 0.15s;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:12px;font-weight:700;user-select:none;text-align:center;}
.extra-tile:active{transform:scale(0.97);}
.extra-tile.on{background:var(--gold-soft);border-color:var(--gold);color:var(--gold);}
.extra-cost{font-size:10px;font-weight:500;opacity:0.6;}
.btn{border:none;border-radius:50px;padding:13px 24px;font-size:13px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:linear-gradient(135deg,var(--purple) 0%,#7a1fd4 100%);color:#fff;box-shadow:0 4px 20px rgba(190,60,255,0.3);flex:1;}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(190,60,255,0.45);}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-ghost:hover{border-color:var(--red);color:var(--red);}
.btn-add-order{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:transparent;border:2px dashed rgba(190,60,255,0.3);border-radius:var(--r);color:var(--purple);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;padding:18px;transition:all 0.2s;margin-bottom:24px;}
.btn-add-order:hover{background:var(--purple-soft);border-color:var(--purple);}
.order-footer{display:flex;gap:10px;flex-wrap:wrap;padding-top:18px;border-top:1px solid var(--border);}
.summary-card{background:rgba(255,255,255,0.025);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-top:8px;display:none;animation:slideUp 0.4s ease;}
.summary-head{background:linear-gradient(135deg,rgba(190,60,255,0.15) 0%,rgba(80,0,140,0.08) 100%);padding:26px 26px 20px;border-bottom:1px solid var(--border);}
.summary-head h3{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.total-pill{display:inline-flex;align-items:center;gap:10px;background:var(--gold);color:#07050f;font-size:24px;font-weight:800;padding:10px 24px;border-radius:50px;}
.summary-body{padding:26px;}
.summary-pre{background:rgba(0,0,0,0.35);border:1px solid var(--border);border-radius:var(--r);padding:18px;font-family:'Courier New',monospace;font-size:12.5px;line-height:1.9;white-space:pre-wrap;word-break:break-word;max-height:460px;overflow-y:auto;margin-bottom:22px;color:#d5cce8;}
.btn-wa{display:flex;align-items:center;justify-content:center;gap:10px;background:linear-gradient(135deg,#25D366 0%,#128C7E 100%);color:#fff;text-decoration:none;width:100%;padding:18px;border-radius:50px;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:800;transition:all 0.2s;box-shadow:0 4px 20px rgba(37,211,102,0.25);}
.btn-wa:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(37,211,102,0.4);}
.footer{text-align:center;margin-top:48px;padding:20px;color:var(--muted);font-size:12px;border-top:1px solid var(--border);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--red);color:#fff;padding:12px 22px;border-radius:50px;font-size:13px;font-weight:700;transition:transform 0.3s ease;z-index:999;pointer-events:none;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
@media(max-width:480px){
  .header-title{font-size:40px;}
  .products-grid{grid-template-columns:repeat(2,1fr);}
  .comp-grid{grid-template-columns:repeat(2,1fr);}
  .extras-grid{grid-template-columns:repeat(2,1fr);}
  .fields-row{grid-template-columns:1fr;}
}



.unit-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.unit-tab{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:11px;font-weight:700;cursor:pointer;color:var(--muted);font-family:'DM Sans',sans-serif;transition:all 0.2s;}
.unit-tab.active{background:var(--purple-soft);border-color:var(--purple);color:var(--purple);}
.pcs-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;}
.unit-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}.unit-tab{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:11px;font-weight:700;cursor:pointer;color:var(--muted);font-family:'DM Sans',sans-serif;transition:all 0.2s;}.unit-tab.active{background:var(--purple-soft);border-color:var(--purple);color:var(--purple);}.unit-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}.unit-tab{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:11px;font-weight:700;cursor:pointer;color:var(--muted);font-family:'DM Sans',sans-serif;transition:all 0.2s;}.unit-tab.active{background:var(--purple-soft);border-color:var(--purple);color:var(--purple);}
/* ── Pills ── */
.header-strip{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;margin-top:20px;padding-top:20px;border-top:1px solid rgba(255,255,255,0.06);}
.info-pill{font-size:11px;font-weight:700;letter-spacing:0.5px;padding:5px 12px;border-radius:50px;background:rgba(190,60,255,0.1);border:1px solid rgba(190,60,255,0.2);color:rgba(255,255,255,0.78);}
/* ── City picker ── */
.city-picker-btn{width:100%;background:#0d0820;border:1px solid rgba(190,60,255,0.3);border-radius:10px;padding:11px 14px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;text-align:left;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:border-color 0.2s;}
.city-picker-btn:focus{border-color:rgba(190,60,255,0.6);outline:none;}
.cp-arrow{font-size:10px;color:rgba(190,60,255,0.7);}
#cp-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:300;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);align-items:flex-end;justify-content:center;padding-bottom:16px;}
#cp-overlay.open{display:flex;}
#cp-card{width:92vw;max-width:430px;background:linear-gradient(160deg,#140019 0%,#0b0617 100%);border:1px solid rgba(190,60,255,0.28);border-radius:22px;box-shadow:0 10px 40px rgba(0,0,0,0.55);overflow:hidden;}
.cp-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;border-bottom:1px solid rgba(255,255,255,0.07);}
.cp-header-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:var(--gold);}
.cp-close{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:var(--muted);width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;}
#cp-list{max-height:55vh;overflow-y:auto;overscroll-behavior:contain;}
.cp-item{padding:13px 20px;font-size:14px;font-weight:500;color:#f0f0f0;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:space-between;transition:background 0.15s;}
.cp-item:last-child{border-bottom:none;}
.cp-item:active,.cp-item:hover{background:rgba(190,60,255,0.12);}
.cp-item.active{color:#be3cff;font-weight:700;background:rgba(190,60,255,0.08);}
.cp-item.active::after{content:'✓';font-size:13px;color:#be3cff;}
/* ── SW Notice ── */
.sw-notice{display:none;align-items:center;gap:6px;margin-top:6px;margin-bottom:4px;padding:8px 12px;border-radius:10px;background:rgba(255,200,40,0.08);border:1px solid rgba(255,200,40,0.2);color:rgba(255,200,40,0.85);font-size:11px;font-weight:600;line-height:1.4;}
/* ── Fixed bar ── */
#order-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;display:none;background:rgba(14,6,28,0.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid rgba(190,60,255,0.3);padding:12px 20px;padding-bottom:calc(12px + env(safe-area-inset-bottom));align-items:center;justify-content:space-between;gap:12px;box-shadow:0 -4px 24px rgba(0,0,0,0.5);}
#order-bar.visible{display:flex;}
.bar-info{display:flex;align-items:center;gap:10px;flex:1;min-width:0;}
.bar-logo{width:32px;height:32px;border-radius:50%;object-fit:cover;flex-shrink:0;}
.bar-text{min-width:0;}
.bar-items{font-size:11px;color:var(--muted);font-weight:600;}
.bar-total{font-size:20px;font-weight:800;color:var(--gold);line-height:1.1;}
.bar-btn{background:linear-gradient(135deg,var(--purple),#7a1fd4);color:#fff;border:none;border-radius:50px;padding:12px 18px;font-size:13px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;white-space:nowrap;flex-shrink:0;box-shadow:0 4px 16px rgba(190,60,255,0.35);transition:all 0.2s;}
/* ── Modal ── */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.68);z-index:200;backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px);align-items:flex-end;justify-content:center;padding-bottom:12px;}
#modal-overlay.open{display:flex;}
#modal-sheet{width:92vw;max-width:430px;max-height:82vh;background:linear-gradient(160deg,#13092a 0%,#0b0617 100%);border-radius:32px 32px 24px 24px;border:1px solid rgba(190,60,255,0.3);box-shadow:0 -2px 40px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.06);z-index:201;display:flex;flex-direction:column;transform:translateY(110%);transition:transform 0.34s cubic-bezier(0.32,0.72,0,1);overscroll-behavior:contain;margin-bottom:4px;padding-bottom:env(safe-area-inset-bottom);}
#modal-sheet.open{transform:translateY(0);}
.modal-drag-handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,0.12);margin:10px auto 0;flex-shrink:0;}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.06);}
#modal-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1.5px;color:var(--gold);}
.modal-x{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:var(--muted);cursor:pointer;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
#modal-tabs{padding:0 18px;flex-shrink:0;}
.modal-unit-tabs{display:flex;gap:6px;flex-wrap:wrap;padding:10px 0 4px;}
.modal-unit-tab{flex:1;min-width:60px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:20px;padding:8px 10px;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;text-align:center;}
.modal-unit-tab.active{background:rgba(190,60,255,0.15);border-color:rgba(190,60,255,0.5);color:#be3cff;}
#modal-body{padding:12px 18px 8px;overflow-y:auto;flex:1;overscroll-behavior:contain;}
.modal-footer{display:flex;gap:8px;padding:12px 18px;border-top:1px solid rgba(255,255,255,0.06);flex-shrink:0;}
.modal-btn-cancel{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:50px;padding:12px 20px;font-size:13px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;}
.modal-btn-save{background:linear-gradient(135deg,var(--purple),#7a1fd4);color:#fff;border:none;border-radius:50px;padding:12px 24px;font-size:13px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;flex:1;box-shadow:0 4px 16px rgba(190,60,255,0.35);}

/* ── Payment cards ── */
.pay-card {
  background: rgba(255,255,255,0.04);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 13px 10px;
  font-size: 13px;
  font-weight: 700;
  color: var(--muted);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.2s;
  text-align: center;
  width: 100%;
}
.pay-card:hover { border-color: rgba(190,60,255,0.4); color: var(--text); }
.pay-card.pay-selected {
  background: rgba(190,60,255,0.15);
  border-color: rgba(190,60,255,0.6);
  color: #be3cff;
  box-shadow: 0 0 12px rgba(190,60,255,0.2);
}
.pay-info-box {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 14px 16px;
  margin-top: 4px;

  {id:'sobremesa',name:'Sobremesa Especial',price:8,  img:IMG_SOBREMESA,  contain:true, pad:false, special:true},
  {id:'combo',    name:'Combo Família',    price:90, img:IMG_COMBO,      contain:true, pad:false, special:true}
];
// ── CONFIG ──────────────────────────────────────────────
var CITIES = ['Retirada no Local','Abington','Brockton','East Bridgewater','Holbrook','Rockland','South Weymouth','Whitman'];
var WA_NUM = '17742577544';
var EXTRA_PRICE = 2.00;
var COMPS = ['Leite Ninho','Leite Condensado','Paçoca','Granola','Amendoim','Banana','Uva','Morango','Sucrilhos'];
var EXTRAS = ['Gotas de Chocolate','Creme de Ninho','Creme de Maracujá','Nutella'];
var GARRAFA_ITEMS = ['Leite Ninho','Leite Condensado','Creme de Ninho','Creme de Maracujá','Paçoca','Granola'];
var GARRAFA_FREE = 2;
var SOB_BASES  = ['Morango','Uva'];
var SOB_CREMES = ['Creme de Ninho','Creme de Maracujá'];
// balde removed from NO_COMPS so it gets its own comp section
var NO_COMPS_IDS = [];
var COMBO_FREE = 5;

// ── STATE ────────────────────────────────────────────────
var orders = [];
var nextId = 1;
var activeTab = {};

function sid(s) { return s.replace(/[^a-zA-Z0-9]/g, '_'); }
function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;'); }

function newUnit()  { return { nome: '', comps: {}, obs: '' }; }
function newOrder(pre) {
  return {
    id: nextId++,
    nome: '', cidade: (pre && pre.cidade) || '', endereco: (pre && pre.endereco) || '',
    obs: '',
    prods: {}, units: {}, extras: {}
  };
}
function getOrder(id) {
  for (var i = 0; i < orders.length; i++) if (orders[i].id === id) return orders[i];
  return null;
}
function ensureUnits(o, pid) {
  var q = o.prods[pid] || 0;
  if (!o.units[pid]) o.units[pid] = [];
  while (o.units[pid].length < q) o.units[pid].push(newUnit());
  o.units[pid].length = q;
  return o.units[pid];
}
function getTab(oid, pid) {
  var k = oid + '-' + pid;
  var q = (getOrder(oid) || { prods: {} }).prods[pid] || 0;
  if (!activeTab[k] || activeTab[k] >= q) activeTab[k] = 0;
  return activeTab[k];
}
function setTab(oid, pid, i) {
  activeTab[oid + '-' + pid] = i;
  refreshUnits(oid);
}

// ── RENDER ───────────────────────────────────────────────
function renderAll() {
  var c = document.getElementById('orders-container');
  var html = '';
  for (var i = 0; i < orders.length; i++) html += renderOrder(orders[i], i);
  c.innerHTML = html;
}

function renderOrder(o, idx) {
  var cityOpts = '<option value="">Selecione a cidade</option>';
  for (var i = 0; i < CITIES.length; i++)
    cityOpts += '<option value="' + CITIES[i] + '"' + (o.cidade === CITIES[i] ? ' selected' : '') + '>' + CITIES[i] + '</option>';

  var regularTiles = '', specialTiles = '';
  for (var i = 0; i < PRODUCTS.length; i++) {
    var p = PRODUCTS[i];
    var q = o.prods[p.id] || 0;
    var imgHtml;
    if (p.img) {
      var st = p.contain ? (p.pad ? 'object-fit:contain;background:#0d0820;padding:12px;' : 'object-fit:contain;background:#0d0820;') : '';
      imgHtml = '<img src="' + p.img + '" alt="' + p.name + '" style="width:100%;height:100%;' + st + '">';
    } else {
      imgHtml = '<div style="width:100%;height:100%;background-image:url(\'' + IMG_COLLAGE + '\');background-position:' + (p.bgPos || '0% 0%') + ';background-size:155% auto;"></div>';
    }
    var tile = '<div class="product-tile' + (q > 0 ? ' active' : '') + (p.special ? ' special' : '') + '" id="pt-' + o.id + '-' + p.id + '">'
      + '<div class="p-img">' + imgHtml + '</div>'
      + '<div class="p-info">'
        + '<div class="p-name">' + p.name + '</div>'
        + '<div class="p-price">$' + p.price + '</div>'
        + '<div class="qty-row">'
          + '<button class="q-btn" onclick="event.stopPropagation();changeQty(' + o.id + ',\'' + p.id + '\',-1)">&#8722;</button>'
          + '<span class="q-val" id="qv-' + o.id + '-' + p.id + '">' + q + '</span>'
          + '<button class="q-btn" onclick="event.stopPropagation();changeQty(' + o.id + ',\'' + p.id + '\',1)">+</button>'
        + '</div>'
      + '</div></div>';
    if (p.special) specialTiles += tile; else regularTiles += tile;
  }

  var extHtml = '';
  for (var i = 0; i < EXTRAS.length; i++) {
    var e = EXTRAS[i]; var q = o.extras[e] || 0;
    extHtml += '<div class="extra-tile' + (q > 0 ? ' on' : '') + '" id="et-' + o.id + '-' + sid(e) + '">'
      + '<div class="et-left"><span class="et-name">' + e + '</span><span class="extra-cost">+$' + EXTRA_PRICE.toFixed(2) + '</span></div>'
      + '<div style="display:flex;flex-direction:row;align-items:center;background:rgba(0,0,0,0.3);border-radius:20px;overflow:hidden;">'
        + '<button class="q-btn" onclick="chgExtra(' + o.id + ',\'' + e + '\',-1)" style="width:28px;height:28px;">&#8722;</button>'
        + '<span style="min-width:22px;text-align:center;font-weight:800;font-size:13px;" id="eq-' + o.id + '-' + sid(e) + '">' + q + '</span>'
        + '<button class="q-btn" onclick="chgExtra(' + o.id + ',\'' + e + '\',1)" style="width:28px;height:28px;">+</button>'
      + '</div></div>';
  }

  return '<div class="order-card" id="order-' + o.id + '">'
    + '<div class="order-head">'
      + '<div class="order-num">Pedido ' + (idx + 1) + '</div>'
      + '<button class="btn btn-ghost" onclick="removeOrder(' + o.id + ')" style="padding:8px 14px;font-size:12px;">&#10005; Remover</button>'
    + '</div>'
    + '<div class="order-body">'
      + '<div class="field"><label>Nome do Cliente</label>'
        + '<input type="text" placeholder="SEU NOME COMPLETO" value="' + esc(o.nome) + '" oninput="var v=this.value.toUpperCase();this.value=v;getOrder(' + o.id + ').nome=v">'
      + '</div>'
      + '<div class="fields-row">'
        + '<div class="field"><label>Cidade</label>'
          + '<button type="button" class="city-picker-btn" id="cpbtn' + o.id + '" onclick="showCityPicker(' + o.id + ')">' + (o.cidade || 'Selecione a cidade') + '<span class="cp-arrow">&#9660;</span></button>'
        + '</div>'
        + '<div id="swmsg' + o.id + '" class="sw-notice" style="display:none;">'
        + '🚗 Para South Weymouth, as entregas são realizadas até a área da Marshalls.'
        + '</div>'
        + '<div class="field"><label>Endereço</label>'
          + '<input type="text" id="end-' + o.id + '" placeholder="NÚMERO, RUA..." value="' + esc(o.endereco) + '" oninput="var v=this.value.toUpperCase();this.value=v;getOrder(' + o.id + ').endereco=v">'
        + '</div>'
      + '</div>'
      + '<div class="section-divider"><span><img src="' + IMG_LOGO + '" style="width:18px;height:18px;border-radius:50%;object-fit:cover;vertical-align:middle;margin-right:5px;"> Açaí</span></div>'
      + '<div class="products-grid">' + regularTiles + '</div>'
      + '<div class="section-divider" style="margin-top:4px;"><span>&#x2728; Especiais</span></div>'
      + '<div class="products-grid" style="margin-bottom:20px;">' + specialTiles + '</div>'
      + ''
      + '<div class="s-label">&#127851; Extras Especiais</div>'
      + '<div class="extras-grid">' + extHtml + '</div>'
      + '<div class="field" style="margin-top:4px;">'
        + '<label>&#128221; Observação do Pedido</label>'
        + '<textarea placeholder="Alguma observação geral sobre o pedido..." rows="2" '
          + 'oninput="getOrder(' + o.id + ').obs=this.value" '
          + 'style="width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px;color:var(--text);font-size:13px;font-family:\'DM Sans\',sans-serif;resize:none;">' + esc(o.obs || '') + '</textarea>'
      + '</div>'
      + '<div class="order-footer">'
        + '<button class="btn btn-primary" onclick="generate()">&#128203; Gerar Pedido Final</button>'
        + '<button class="btn btn-ghost" onclick="addOrder()">+ Novo Pedido</button>'
      + '</div>'
    + '</div></div>';
}

// ── UNIT SECTIONS ────────────────────────────────────────
function buildUnitSections(o) {
  var html = '';
  for (var pi = 0; pi < PRODUCTS.length; pi++) {
    var p = PRODUCTS[pi];
    var q = o.prods[p.id] || 0;
    if (!q) continue;
    if (NO_COMPS_IDS.indexOf(p.id) >= 0) continue;

    var units = ensureUnits(o, p.id);
    var ai = getTab(o.id, p.id);
    var unit = units[ai] || newUnit();
    var isSob = p.id === 'sobremesa';
    var isGar = p.id === 'garrafa';
    var isBalde = p.id === 'balde';
    var bdrColor = isSob ? 'rgba(11,191,191,0.4)' : (isBalde ? 'rgba(255,209,102,0.3)' : 'rgba(190,60,255,0.25)');
    var ttlColor = isSob ? 'var(--teal)' : (isBalde ? 'var(--gold)' : 'var(--text)');

    var tabs = '';
    if (q > 1) {
      tabs = '<div class="unit-tabs">';
      for (var ti = 0; ti < q; ti++)
        tabs += '<button class="unit-tab' + (ti === ai ? ' active' : '') + '" onclick="setTab(' + o.id + ',\'' + p.id + '\',' + ti + ')">' + p.name + ' #' + (ti + 1) + '</button>';
      tabs += '</div>';
    }

    // Name field — hidden for balde and combo
    var nf = (isBalde || p.id === 'combo') ? '' :
      '<div style="margin-bottom:12px;">'
      + '<div style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;">&#128100; Nome neste item</div>'
      + '<input type="text" placeholder="Ex: GABRIEL, MÃE, PAI..." value="' + esc(unit.nome) + '" '
        + 'oninput="var v=this.value.toUpperCase();this.value=v;ensureUnits(getOrder(' + o.id + '),\'' + p.id + '\')[' + ai + '].nome=v" '
        + 'style="width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 12px;color:var(--text);font-size:13px;font-family:\'DM Sans\',sans-serif;text-transform:uppercase;">'
      + '</div>';

    var content;
    if (isGar)          content = buildGarrafaSection(o, p.id, unit, ai);
    else if (isSob)     content = buildSobSection(o, p.id, unit, ai);
    else if (isBalde)   content = buildCompCounters(o, p.id, unit, ai, true);
    else if (p.id === 'combo') content = buildComboSection(o, p.id, unit, ai);
    else                content = buildCompCounters(o, p.id, unit, ai, false);

    html += '<div class="pcs-block" style="border-color:' + bdrColor + ';margin-bottom:12px;">'
      + '<div class="pcs-title" style="color:' + ttlColor + ';margin-bottom:12px;">'
        + '<img src="' + IMG_LOGO + '" class="logo-sm" alt="">'
        + (q > 1 ? p.name + ' — ' + (ai + 1) + '/' + q : p.name)
      + '</div>'
      + tabs + nf + content
    + '</div>';
  }
  if (!html) html = '<div style="font-size:12px;color:var(--muted);padding:10px 0 14px;">&#8593; Selecione um produto para ver os complementos</div>';
  return html;
}

// Counter grid used by regular products and balde
// allPaid=false: 1st of each comp is free, extras +$2
// allPaid=true (balde): all comps cost +$2 each
function buildCompCounters(o, pid, unit, ai, allPaid) {
  var hint = allPaid
    ? '<div style="font-size:11px;color:var(--muted);margin-bottom:10px;">Cada incremento = +$' + EXTRA_PRICE.toFixed(2) + '</div>'
    : '<div style="font-size:11px;color:var(--muted);margin-bottom:10px;">1ª porção grátis — adicionais +$' + EXTRA_PRICE.toFixed(2) + ' cada</div>';
  var html = hint + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">';
  for (var i = 0; i < COMPS.length; i++) {
    var c = COMPS[i];
    var q = unit.comps[c] || 0;
    var active = q > 0;
    var cost = '';
    if (active) {
      var paid = allPaid ? q : Math.max(0, q - 1);
      cost = paid > 0 ? '+$' + (paid * EXTRA_PRICE).toFixed(2) : '<span style="color:var(--green);font-size:10px;">Grátis</span>';
    }
    html += '<div style="background:var(--surface);border:1px solid ' + (active ? (allPaid ? 'var(--gold)' : 'var(--purple)') + ';background:' + (allPaid ? 'rgba(255,209,102,0.08)' : 'var(--purple-soft)') : 'var(--border)') + ';border-radius:var(--r-sm);padding:8px 10px;">'
      + '<div style="font-size:12px;font-weight:600;margin-bottom:6px;color:' + (active ? 'var(--text)' : 'var(--muted)') + ';">' + c + '</div>'
      + '<div style="display:flex;align-items:center;justify-content:space-between;">'
        + '<div style="display:flex;align-items:center;background:rgba(0,0,0,0.3);border-radius:16px;overflow:hidden;">'
          + '<button class="q-btn" onclick="chgComp(' + o.id + ',\'' + pid + '\',' + ai + ',\'' + c + '\',-1)" style="width:24px;height:24px;font-size:13px;">&#8722;</button>'
          + '<span style="min-width:18px;text-align:center;font-size:12px;font-weight:800;">' + q + '</span>'
          + '<button class="q-btn" onclick="chgComp(' + o.id + ',\'' + pid + '\',' + ai + ',\'' + c + '\',1)" style="width:24px;height:24px;font-size:13px;">+</button>'
        + '</div>'
        + '<span style="font-size:10px;font-weight:700;">' + cost + '</span>'
      + '</div>'
    + '</div>';
  }
  return html + '</div>';
}

function buildGarrafaSection(o, pid, unit, ai) {
  var totalQty = 0;
  for (var i = 0; i < GARRAFA_ITEMS.length; i++) totalQty += unit.comps[GARRAFA_ITEMS[i]] || 0;
  var free = Math.min(totalQty, GARRAFA_FREE);
  var paid = Math.max(0, totalQty - GARRAFA_FREE);
  var counterColor = totalQty >= GARRAFA_FREE ? 'var(--gold)' : 'var(--muted)';
  var html = '<div style="font-size:11px;font-weight:700;margin-bottom:10px;color:' + counterColor + ';">'
    + 'Grátis: ' + free + '/' + GARRAFA_FREE + (paid > 0 ? ' · Extras: ' + paid + ' (+$' + (paid * EXTRA_PRICE).toFixed(2) + ')' : '')
    + '</div>'
    + '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:7px;">';
  for (var i = 0; i < GARRAFA_ITEMS.length; i++) {
    var c = GARRAFA_ITEMS[i];
    var q = unit.comps[c] || 0;
    var on = q > 0;
    html += '<div style="background:var(--surface);border:1px solid ' + (on ? 'var(--purple)' : 'var(--border)') + ';border-radius:var(--r-sm);padding:8px 6px;text-align:center;">'
      + '<div style="font-size:11px;font-weight:600;margin-bottom:6px;color:' + (on ? 'var(--text)' : 'var(--muted)') + ';">' + c + '</div>'
      + '<div style="display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.3);border-radius:16px;overflow:hidden;">'
        + '<button class="q-btn" onclick="chgComp(' + o.id + ',\'' + pid + '\',' + ai + ',\'' + c + '\',-1)" style="width:22px;height:22px;font-size:12px;">&#8722;</button>'
        + '<span style="min-width:16px;text-align:center;font-size:11px;font-weight:800;">' + q + '</span>'
        + '<button class="q-btn" onclick="chgComp(' + o.id + ',\'' + pid + '\',' + ai + ',\'' + c + '\',1)" style="width:22px;height:22px;font-size:12px;">+</button>'
      + '</div>'
    + '</div>';
  }
  return html + '</div>';
}


function buildComboSection(o, pid, unit, ai) {
  var totalQty = 0;
  for (var i = 0; i < COMPS.length; i++) totalQty += unit.comps[COMPS[i]] || 0;
  var free = Math.min(totalQty, COMBO_FREE);
  var paid = Math.max(0, totalQty - COMBO_FREE);
  var h = '<div style="background:rgba(11,191,191,0.08);border:1px solid rgba(11,191,191,0.3);border-radius:var(--r-sm);padding:12px;margin-bottom:14px;">'
    + '<div style="color:var(--teal);font-size:12px;font-weight:700;margin-bottom:4px;">&#10003; 2 Baldes Inclusos</div>'
    + '<div style="color:var(--teal);font-size:12px;font-weight:700;">&#10003; Até ' + COMBO_FREE + ' Ingredientes Grátis</div>'
  + '</div>'
  + '<div style="font-size:11px;font-weight:700;margin-bottom:10px;color:' + (paid > 0 ? 'var(--gold)' : 'var(--teal)') + ';">'
    + 'Selecionados: ' + free + '/' + COMBO_FREE + (paid > 0 ? ' · Extras: ' + paid + ' (+$' + (paid * EXTRA_PRICE).toFixed(2) + ')' : '')
  + '</div>'
  + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">';
  for (var i = 0; i < COMPS.length; i++) {
    var c = COMPS[i];
    var q = unit.comps[c] || 0;
    var on = q > 0;
    var usedBefore = 0;
    for (var j = 0; j < i; j++) usedBefore += unit.comps[COMPS[j]] || 0;
    var thisFree = Math.max(0, Math.min(q, COMBO_FREE - usedBefore));
    var thisPaid = q - thisFree;
    var costLabel = on ? (thisPaid > 0 ? '<span style="color:var(--gold);font-size:10px;">+$' + (thisPaid * EXTRA_PRICE).toFixed(2) + '</span>' : '<span style="color:var(--teal);font-size:10px;">Grátis</span>') : '';
    h += '<div style="background:var(--surface);border:1px solid ' + (on ? 'var(--teal)' : 'var(--border)') + ';border-radius:var(--r-sm);padding:8px 10px;">'
      + '<div style="font-size:12px;font-weight:600;margin-bottom:6px;color:' + (on ? 'var(--text)' : 'var(--muted)') + ';">' + c + '</div>'
      + '<div style="display:flex;align-items:center;justify-content:space-between;">'
        + '<div style="display:flex;align-items:center;background:rgba(0,0,0,0.3);border-radius:16px;overflow:hidden;">'
          + '<button class="q-btn" onclick="chgComp(' + o.id + ',\'' + pid + '\',' + ai + ',\'' + c + '\',-1)" style="width:24px;height:24px;font-size:13px;">&#8722;</button>'
          + '<span style="min-width:18px;text-align:center;font-size:12px;font-weight:800;">' + q + '</span>'
          + '<button class="q-btn" onclick="chgComp(' + o.id + ',\'' + pid + '\',' + ai + ',\'' + c + '\',1)" style="width:24px;height:24px;font-size:13px;">+</button>'
        + '</div>'
        + costLabel
      + '</div>'
    + '</div>';
  }
  return h + '</div>';
}
function buildSobSection(o, pid, unit, ai) {
  var selBase = '', selCreme = '';
  for (var i = 0; i < SOB_BASES.length; i++) if ((unit.comps[SOB_BASES[i]] || 0) > 0) selBase = SOB_BASES[i];
  for (var i = 0; i < SOB_CREMES.length; i++) if ((unit.comps[SOB_CREMES[i]] || 0) > 0) selCreme = SOB_CREMES[i];
  var h = '<div style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--teal);margin-bottom:8px;">Base (escolha 1)</div>'
    + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px;">';
  for (var i = 0; i < SOB_BASES.length; i++) {
    var c = SOB_BASES[i];
    h += '<div class="chip chip-comp' + (selBase === c ? ' on' : '') + '" onclick="selSob(' + o.id + ',\'' + pid + '\',' + ai + ',\'base\',\'' + c + '\')">' + c + '</div>';
  }
  h += '</div><div style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--teal);margin-bottom:8px;">Creme (escolha 1)</div>'
    + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px;">';
  for (var i = 0; i < SOB_CREMES.length; i++) {
    var c = SOB_CREMES[i];
    h += '<div class="chip chip-comp' + (selCreme === c ? ' on' : '') + '" onclick="selSob(' + o.id + ',\'' + pid + '\',' + ai + ',\'creme\',\'' + c + '\')">' + c + '</div>';
  }
  h += '</div><div style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;">Observação</div>'
    + '<textarea placeholder="Ex: mais morango, sem creme..." rows="2" '
      + 'oninput="ensureUnits(getOrder(' + o.id + '),\'' + pid + '\')[' + ai + '].obs=this.value" '
      + 'style="width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px;color:var(--text);font-size:13px;font-family:\'DM Sans\',sans-serif;resize:none;">'
      + esc(unit.obs || '') + '</textarea>';
  return h;
}

function refreshUnits(oid) {
  if(modalOpen && modalOid===oid){
    renderModalContent();
    return;
  }
  var o = getOrder(oid); if (!o) return;
  var el = document.getElementById('units-' + oid); if (!el) return;
  el.innerHTML = buildUnitSections(o);
}

// ── INTERACTIONS ─────────────────────────────────────────
function changeQty(oid, pid, d) {
  var o = getOrder(oid); if (!o) return;
  o.prods[pid] = Math.max(0, (o.prods[pid] || 0) + d);
  var q = o.prods[pid];
  document.getElementById('qv-' + oid + '-' + pid).textContent = q;
  var found = null;
  for (var i = 0; i < PRODUCTS.length; i++) if (PRODUCTS[i].id === pid) { found = PRODUCTS[i]; break; }
  var tile = document.getElementById('pt-' + oid + '-' + pid);
  tile.className = 'product-tile' + (q > 0 ? ' active' : '') + (found && found.special ? ' special' : '');
  if(q>0){
    tile.onclick=function(){openModal(oid,pid,false);};
    tile.style.cursor='pointer';
  } else { tile.onclick=null; tile.style.cursor=''; }
  ensureUnits(o, pid);
  refreshUnits(oid);
  if(d>0&&q>0){
    clearTimeout(_modalDebounce);
    (function(_o,_p){
      _modalDebounce=setTimeout(function(){ openModal(_o,_p,true); },700);
    })(oid,pid);
  }
  if(typeof updateBar==='function') updateBar();

function chgComp(oid, pid, ai, comp, d) {

  var u = ensureUnits(o, pid)[ai]; if (!u) return;
  u.comps[comp] = Math.max(0, (u.comps[comp] || 0) + d);
  refreshUnits(oid);
}

function selSob(oid, pid, ai, group, item) {
  var o = getOrder(oid); if (!o) return;
  var u = ensureUnits(o, pid)[ai]; if (!u) return;
  var arr = group === 'base' ? SOB_BASES : SOB_CREMES;
  for (var i = 0; i < arr.length; i++) u.comps[arr[i]] = 0;
  u.comps[item] = 1;
  refreshUnits(oid);
}

function chgExtra(oid, extra, d) {

// ── TOTALS ───────────────────────────────────────────────
function calcTotal(o) {
  var t = 0;
  for (var pi = 0; pi < PRODUCTS.length; pi++) {
    var p = PRODUCTS[pi];
    var q = o.prods[p.id] || 0; if (!q) continue;
    t += q * p.price;
    if (NO_COMPS_IDS.indexOf(p.id) >= 0) continue;
    var units = o.units[p.id] || [];
    for (var ui = 0; ui < units.length; ui++) {
      var u = units[ui];
      if (p.id === 'garrafa') {
        var totalQty = 0;
        for (var ci = 0; ci < GARRAFA_ITEMS.length; ci++) totalQty += u.comps[GARRAFA_ITEMS[ci]] || 0;
        t += Math.max(0, totalQty - GARRAFA_FREE) * EXTRA_PRICE;
      } else if (p.id === 'balde') {
        for (var ci = 0; ci < COMPS.length; ci++) t += (u.comps[COMPS[ci]] || 0) * EXTRA_PRICE;
      } else if (p.id === 'combo') {
        var totalQty = 0;
        for (var ci = 0; ci < COMPS.length; ci++) totalQty += u.comps[COMPS[ci]] || 0;
        t += Math.max(0, totalQty - COMBO_FREE) * EXTRA_PRICE;
      } else if (p.id !== 'sobremesa') {
        for (var ci = 0; ci < COMPS.length; ci++) t += Math.max(0, (u.comps[COMPS[ci]] || 0) - 1) * EXTRA_PRICE;
      }
    }
  }
  for (var i = 0; i < EXTRAS.length; i++) t += (o.extras[EXTRAS[i]] || 0) * EXTRA_PRICE;
  return t;
}

function toast(msg) {

// ── GENERATE ─────────────────────────────────────────────
function generate() {
  for (var i = 0; i < orders.length; i++) {
    var o = orders[i], n = i + 1;
    if (!o.nome.trim())      { toast('Pedido ' + n + ': informe o nome.'); return; }
    if (!o.cidade)           { toast('Pedido ' + n + ': selecione a cidade.'); return; }
    if (!o.endereco.trim())  { toast('Pedido ' + n + ': informe o endereço.'); return; }
    var hp = false;
    for (var pi = 0; pi < PRODUCTS.length; pi++) if ((o.prods[PRODUCTS[pi].id] || 0) > 0) hp = true;
    if (!hp) { toast('Pedido ' + n + ': selecione um produto.'); return; }
  }
  var grand = 0, hasDelivery = false, allWhitman = orders.length > 0, hasCombo = false;
  for (var i = 0; i < orders.length; i++) {
    var o = orders[i];
    grand += calcTotal(o);
    for (var pi = 0; pi < PRODUCTS.length; pi++) {
      var p = PRODUCTS[pi];
      if (p.id !== 'balde' && p.id !== 'combo' && (o.prods[p.id] || 0) > 0) hasDelivery = true;
    }
    if ((o.prods['combo'] || 0) > 0) hasCombo = true;
    if (o.cidade !== 'Whitman') allWhitman = false;
  }
  var hasRetirada = orders.every(function(o){ return o.cidade === 'Retirada no Local'; });
  var frete = (hasDelivery && !allWhitman && !hasCombo && !hasRetirada) ? 5 : 0;
  var total = grand + frete;

  var lines = ['*D&G AÇAÍ BERRY*', ''];
  for (var i = 0; i < orders.length; i++) {
    var o = orders[i];
    lines.push('*' + o.nome + '*');
    lines.push('   Cidade: ' + o.cidade);
    lines.push('   Endereço: ' + o.endereco);
    lines.push('');
    for (var pi = 0; pi < PRODUCTS.length; pi++) {
      var p = PRODUCTS[pi];
      var q = o.prods[p.id] || 0; if (!q) continue;
      var units = ensureUnits(o, p.id);
      for (var ui = 0; ui < q; ui++) {
        var u = units[ui] || newUnit();
        var num = q > 1 ? ' #' + (ui + 1) : '';
        var who = u.nome ? ' — ' + u.nome : '';
        if(pi>0||ui>0) lines.push('');
        lines.push('   ' + p.name + num + who + ' — $' + p.price.toFixed(2));
        if (NO_COMPS_IDS.indexOf(p.id) >= 0) {
          // no comps
        } else if (p.id === 'combo') {
          var comboItems = [];
          var totalQty = 0;
          for (var ci = 0; ci < COMPS.length; ci++) totalQty += u.comps[COMPS[ci]] || 0;
          var paid = Math.max(0, totalQty - COMBO_FREE);
          for (var ci = 0; ci < COMPS.length; ci++) {
            var cq = u.comps[COMPS[ci]] || 0;
            if (cq > 0) comboItems.push(cq > 1 ? COMPS[ci] + ' x' + cq : COMPS[ci]);
          }
          lines.push('      Inclui: 2 baldes + até 5 complementos grátis');
          if (comboItems.length) lines.push('      Complementos: ' + comboItems.join(', '));
          if (paid > 0) lines.push('      Extras pagos: +$' + (paid * EXTRA_PRICE).toFixed(2));
        } else if (p.id === 'garrafa') {
          var gi = [], giFree = [], giPaid = [];
          var qFree = 0;
          for (var ci = 0; ci < GARRAFA_ITEMS.length; ci++) {
            var cq = u.comps[GARRAFA_ITEMS[ci]] || 0;
            if (cq > 0) {
              for (var x = 0; x < cq; x++) {
                if (qFree < GARRAFA_FREE) { giFree.push(GARRAFA_ITEMS[ci]); qFree++; }
                else giPaid.push(GARRAFA_ITEMS[ci]);
              }
            }
          }
          if (giFree.length) lines.push('      Complementos: ' + giFree.join(', '));
          if (giPaid.length) lines.push('      Extras pagos: ' + giPaid.join(', ') + ' (+$' + (giPaid.length * EXTRA_PRICE).toFixed(2) + ')');
        } else if (p.id === 'sobremesa') {
          var base = '', creme = '';
          for (var ci = 0; ci < SOB_BASES.length; ci++) if ((u.comps[SOB_BASES[ci]] || 0) > 0) base = SOB_BASES[ci];
          for (var ci = 0; ci < SOB_CREMES.length; ci++) if ((u.comps[SOB_CREMES[ci]] || 0) > 0) creme = SOB_CREMES[ci];
          if (base || creme) lines.push('      Complementos: ' + (base || '—') + ' + ' + (creme || '—'));
          if (u.obs && u.obs.trim()) lines.push('      Obs: ' + u.obs);
        } else if (p.id === 'balde') {
          var baldeItems = [];
          for (var ci = 0; ci < COMPS.length; ci++) {
            var cq = u.comps[COMPS[ci]] || 0;
            if (cq > 0) baldeItems.push(cq > 1 ? COMPS[ci] + ' x' + cq : COMPS[ci]);
          }
          if (baldeItems.length) lines.push('      Extras pagos (+$' + (COMPS.reduce(function(acc,c){ return acc + (u.comps[c]||0); }, 0) * EXTRA_PRICE).toFixed(2) + '): ' + baldeItems.join(', '));
        } else {
          var incl = [], extras = [];
          for (var ci = 0; ci < COMPS.length; ci++) {
            var cq = u.comps[COMPS[ci]] || 0;
            if (cq >= 1) incl.push(COMPS[ci]);
            if (cq > 1) extras.push(COMPS[ci] + ' x' + (cq - 1));
          }
          if (incl.length) lines.push('      Complementos: ' + incl.join(', '));
          if (extras.length) {
            var extCost = 0;
            for (var ci = 0; ci < COMPS.length; ci++) extCost += Math.max(0, (u.comps[COMPS[ci]] || 0) - 1) * EXTRA_PRICE;
            lines.push('      Extras pagos: ' + extras.join(', ') + ' (+$' + extCost.toFixed(2) + ')');
          }
        }
      }
    }
    var exts = [], extTotal = 0;
    for (var ei = 0; ei < EXTRAS.length; ei++) {
      var qq = o.extras[EXTRAS[ei]] || 0;
      if (qq > 0) { exts.push(qq > 1 ? EXTRAS[ei] + ' x' + qq : EXTRAS[ei]); extTotal += qq * EXTRA_PRICE; }
    }
    if (exts.length) { lines.push(''); lines.push('   Extras: ' + exts.join(', ') + ' (+$' + extTotal.toFixed(2) + ')'); }
    if (o.obs && o.obs.trim()) lines.push('   Obs: ' + o.obs);
    lines.push('   Subtotal: $' + calcTotal(o).toFixed(2));
    lines.push('');
  }
  if (frete > 0)                        lines.push('Delivery: $' + frete.toFixed(2));
  else if (hasRetirada)                 lines.push('Retirada no Local — Sem Frete');
  else if (hasCombo)                    lines.push('Delivery: FREE (Combo Família)');
  else if (allWhitman && hasDelivery)   lines.push('Delivery: FREE (Whitman)');
  lines.push('━━━━━━━━━━━━━━━━━━━━');
  lines.push('💰 *TOTAL FINAL: $' + total.toFixed(2) + '*');
  lines.push('━━━━━━━━━━━━━━━━━━━━');
  lines.push('');
  lines.push('*Obrigado por escolher D&G Açaí Berry!*');

  var msg = lines.join('\n');
  document.getElementById('summary-pre').textContent = msg;
  document.getElementById('total-pill-val').textContent = '$' + total.toFixed(2);
  document.getElementById('wa-link').href = 'https://wa.me/' + WA_NUM + '?text=' + encodeURIComponent(msg);
  var sc = document.getElementById('summary-card');
  sc.style.display = 'block';
  setTimeout(function () { sc.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 80);
  // Reset and show payment section
  selectedPayment=null; needsChange=null; cashChangeTo='';
  ['cash','venmo','cashapp','zelle'].forEach(function(m){
    var btn=document.getElementById('pay-'+m);
    if(btn) btn.className='pay-card';
  });
  var pd=document.getElementById('pay-detail'); if(pd) pd.innerHTML='';
  var pe=document.getElementById('pay-error'); if(pe) pe.style.display='none';
  var ps=document.getElementById('payment-section'); if(ps) ps.style.display='block';
  // Wire WhatsApp button to validation
  var waLink=document.getElementById('wa-link');
  if(waLink){ waLink.href='#'; waLink.onclick=function(e){e.preventDefault();validateAndSendWA();}; }
}

addOrder();
</script>
